* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #dff0f7; min-height: 100vh; color: var(--text); }

const WEEKDAYS = ['日','一','二','三','四','五','六'];

  SHIHO: { name:'加藤史帆',   color:'#0234b3', light:'#e8eeff', textColor:'#0234b3' },
  KUMI:  { name:'佐々木久美', color:'#800080', light:'#f5e5f5', textColor:'#800080' },
  MIHO:  { name:'渡邉美穂',  color:'#6fbfd9', light:'#e8f6fb', textColor:'#1a7a9a' },

};

// ── FETCH ──
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  if (!json.table || !json.table.rows) return [];
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      const cell = row.c[i];
      obj[col] = cell ? (cell.v !== null ? cell.v : '') : '';
    });
    obj._member = sheetName;
    return obj;
  }).filter(r => r.title);
}

function parseDate(val) {
  if (!val) return null;
  if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}$/)) return new Date(val+'T00:00:00');
  if (typeof val === 'string' && val.startsWith('Date(')) {
    const p = val.replace('Date(','').replace(')','').split(',').map(Number);
    return new Date(p[0], p[1], p[2]);
  }
  return null;
}

fun  --radius-sm: 8px;

<script>
const SHEET_ID = '1G70fvNSynS6p2YBo_SNsU8w0tnU8SUAp3De21hRYMSQ';
const SHEETS = ['MIHO','KUMI','SHIHO','KYOKO'];
const WEEKDAYS = ['日','一','二','三','四','五','六'];

const MEMBER_INFO = {
  SHIHO: { name:'加藤史帆',    color:'#0234b3', light:'#e8eaf6', textColor:'#0234b3' },
  KUMI:  { name:'佐々木久美',  color:'#800080', light:'#f5e5f5', textColor:'#800080' },
  MIHO:  { name:'渡邉美穂',   color:'#6fbfd9', light:'#e8f6fb', textColor:'#1a7a9a' },
  KYOKO: { name:'齊藤京子',   color:'#707780', light:'#f0f2f5', textColor:'#40454c' },
};

let allEvents = [];
let viewSelected = new Set(['all']);
let outSelected = new Set(['all']);

function toggleFabMenu(e) { e.stopPropagation(); document.getElementById('fab-container').classList.toggle('open'); }
function scrollToPanel(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); document.getElementById('fab-container').classList.remove('open'); }
document.addEventListener('click', () => { document.getElementById('fab-container').classList.remove('open'); });

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
  try {
    const res = await fetch(url); const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    if (!json.table || !json.table.rows) return [];
    const cols = json.table.cols.map(c => c.label);
    return json.table.rows.map(row => {
      const obj = {};
      cols.forEach((col, i) => { const cell = row.c[i]; obj[col] = cell ? (cell.v !== null ? cell.v : '') : ''; });
      obj._member = sheetName; return obj;
    }).filter(r => r.title);
  } catch(e) { return []; }
}

function parseDate(val) {
  if (!val) return null;
  if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}$/)) return new Date(val+'T00:00:00');
  if (typeof val === 'string' && val.startsWith('Date(')) {
    const p = val.replace('Date(','').replace(')','').split(',').map(Number);
    return new Date(p[0], p[1], p[2]);
  }
  return null;
}
function formatDate(d) { return `${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`; }
function formatTime(val) { if (!val) return ''; const s = String(val).trim(); return s.includes(':') ? s : ''; }
function isToday(d) { const n = new Date(); return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate(); }
function getViewFiltered() { if (viewSelected.has('all')) return allEvents; return allEvents.filter(e => viewSelected.has(e._member)); }

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const m = tab.dataset.member;
    if (m === 'all') { viewSelected = new Set(['all']); } else {
      viewSelected.delete('all'); if (viewSelected.has(m)) { viewSelected.delete(m); if (viewSelected.size === 0) viewSelected = new Set(['all']); } else { viewSelected.add(m); }
    }
    document.querySelectorAll('.tab').forEach(t => { const tm = t.dataset.member; t.classList.toggle('active', tm === 'all' ? viewSelected.has('all') : viewSelected.has(tm)); });
    renderSchedule();
  });
});

document.querySelectorAll('.out-member-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.member;
    if (m === 'all') { outSelected = new Set(['all']); } else {
      outSelected.delete('all'); if (outSelected.has(m)) { outSelected.delete(m); if (outSelected.size === 0) outSelected = new Set(['all']); } else { outSelected.add(m); }
    }
    document.querySelectorAll('.out-member-btn').forEach(b => { const bm = b.dataset.member; b.classList.toggle('active', bm === 'all' ? outSelected.has('all') : outSelected.has(bm)); });
    document.getElementById('output-result').style.display = 'none';
  });
});

function renderSchedule() {
  const container = document.getElementById('schedule-container');
  const filtered = getViewFiltered(); const multiMember = viewSelected.has('all') || viewSelected.size > 1;
  const withDate = filtered.filter(e => e._date).sort((a,b) => a._date-b._date || (a.time||'').localeCompare(b.time||''));
  const noDate = filtered.filter(e => !e._date);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-3); cutoff.setHours(0,0,0,0);
  const future = withDate.filter(e => e._date >= cutoff);
  const groups = {};
  future.forEach(e => { const k = e._date.toDateString(); if (!groups[k]) groups[k] = { date: e._date, events: [] }; groups[k].events.push(e); });
  let html = ''; if (Object.keys(groups).length === 0 && noDate.length === 0) html = '<div class="empty">暫無行程資料</div>';
  if (Object.keys(groups).length > 0) {
    html += '<div class="section-label">近期行程</div>';
    Object.values(groups).forEach(group => {
      html += `<div class="date-group"><div class="date-header"><span class="date-main">${formatDate(group.date)}</span>${isToday(group.date) ? '<span class="date-today-badge">TODAY</span>' : ''}</div>`;
      group.events.forEach(e => { html += renderCard(e, multiMember); }); html += '</div>';
    });
  }
  if (noDate.length > 0) {
    html += '<div class="section-label">日期未定</div><div class="no-date-section">';
    noDate.forEach(e => { html += renderCard(e, multiMember); }); html += '</div>';
  }
  container.innerHTML = html;
}

function renderCard(e, showMember) {
  const timeStr = formatTime(e.time);
  return `<div class="event-card" data-member="${e._member}"><div class="event-stripe"></div><div class="event-inner"><div class="event-meta">${showMember ? `<span class="event-member-chip">${MEMBER_INFO[e._member].name}</span>` : ''}${e.category ? `<span class="event-category">${e.category}</span>` : ''}${timeStr ? `<span class="event-time">⏰ ${timeStr}</span>` : ''}</div><div class="event-title">${e.title}</div>${e.note ? `<div class="event-note">📝 ${e.note}</div>` : ''}${e.url ? `<a class="event-link" href="${e.url}" target="_blank">🔗 ${e.url}</a>` : ''}</div></div>`;
}

function getOutFiltered() { if (outSelected.has('all')) return allEvents; return allEvents.filter(e => outSelected.has(e._member)); }
function getOutLabel() { if (outSelected.has('all')) return '加藤史帆・佐々木久美・渡邉美穂'; return [...outSelected].map(m => MEMBER_INFO[m]?.name || m).join('・'); }
function getRangeEvents() {
  const range = document.getElementById('output-range').value; const now = new Date(); let start, end;
  if (range === 'week') { start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0); end = new Date(start); end.setDate(start.getDate()+6); end.setHours(23,59,59,999); }
  else if (range === 'twoweeks') { start = new Date(now); start.setHours(0,0,0,0); end = new Date(now); end.setDate(now.getDate()+13); end.setHours(23,59,59,999); }
  else if (range === 'month') { start = new Date(now.getFullYear(), now.getMonth(), 1); end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59); }
  else { start = new Date(now.getFullYear(), now.getMonth()+1, 1); end = new Date(now.getFullYear(), now.getMonth()+2, 0, 23,59,59); }
  return getOutFiltered().filter(e => e._date && e._date >= start && e._date <= end).sort((a,b) => a._date-b._date || (a.time||'').localeCompare(b.time||''));
}
function getRangeLabel() { return { week:'本週', twoweeks:'近兩週', month:'本月', nextmonth:'下月' }[document.getElementById('output-range').value]; }

function generateTextOutput() {
  const inRange = getRangeEvents(); const rangeLabel = getRangeLabel(); const memberLabel = getOutLabel(); const isSingle = !outSelected.has('all') && outSelected.size === 1;
  if (inRange.length === 0) { document.getElementById('output-text').textContent = '此期間暫無行程'; document.getElementById('output-result').style.display = 'block'; return; }
  let text = `📅 ${rangeLabel}${isSingle ? `${memberLabel}行程` : `日向坂OG行程（${memberLabel}）`}\n${'─'.repeat(22)}\n`;
  let lastDate = '';
  inRange.forEach(e => {
    const ds = formatDate(e._date); if (ds !== lastDate) { text += `\n▸ ${ds}\n`; lastDate = ds; }
    const t = formatTime(e.time); text += !isSingle ? `  【${MEMBER_INFO[e._member].name}】` : '  ';
    if (e.category) text += `[${e.category}] `; if (t) text += `${t} `; text += e.title; if (e.note) text += `（${e.note}）`; text += '\n'; if (e.url) text += `  ${e.url}\n`;
  });
  text += `\n${'─'.repeat(22)}`; document.getElementById('output-text').textContent = text; document.getElementById('output-result').style.display = 'block';
}

function copyOutput() { const text = document.getElementById('output-text').textContent; navigator.clipboard.writeText(text).then(() => { const btn = document.querySelector('.copy-btn'); btn.textContent = '已複製 ✓'; setTimeout(() => btn.textContent = '複製', 2000); }); }

// ── CANVAS 繪製 ──
function generateCardOutput() {
  const inRange = getRangeEvents(); if (inRange.length === 0) { alert('此期間暫無行程'); return; }
  const rangeLabel = getRangeLabel(); const memberLabel = getOutLabel(); const isSingle = !outSelected.has('all') && outSelected.size === 1;

  const canvas = document.getElementById('schedule-canvas'); const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 750, PAD = 40, HEADER_H = 110, ROW_H = 68, FOOTER_H = 80;
  const H = HEADER_H + inRange.length * ROW_H + FOOTER_H;

  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 彩虹漸層
  const rainbow = ctx.createLinearGradient(0, 0, W, 0);
  rainbow.addColorStop(0.0, '#ff7eb9');
  rainbow.addColorStop(0.16, '#ffaa64');
  rainbow.addColorStop(0.33, '#ffea7f');
  rainbow.addColorStop(0.5, '#7fe5a3');
  rainbow.addColorStop(0.66, '#6fd0f6');
  rainbow.addColorStop(0.83, '#4866ff');
  rainbow.addColorStop(1.0, '#a142ff');
  ctx.fillStyle = rainbow;
  ctx.fillRect(0, 0, W, 7);

  // 圖卡上的標題：僅在此處套用優雅明體
  ctx.fillStyle = '#1a2a3a';
  ctx.font = "bold 28px 'PMingLiU', 'MingLiU', 'Apple LiSung', 'Songti TC', serif";
  ctx.fillText('日向坂OG行程', PAD, 52);

  ctx.font = "13px 'Noto Sans JP', sans-serif"; ctx.fillStyle = '#7a8a9a';
  const subtitle = `${rangeLabel} · ${memberLabel}`;
  ctx.fillText(subtitle, PAD, 76);

  ctx.strokeStyle = '#e2edf2'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, 92); ctx.lineTo(W-PAD, 92); ctx.stroke();

  let lastDateLabel = '';
  inRange.forEach((e, i) => {
    const y = HEADER_H + i * ROW_H; const info = MEMBER_INFO[e._member];

    ctx.fillStyle = '#f4f8fa';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(PAD, y+2, W-PAD*2, ROW_H-6, 10);
    else ctx.rect(PAD, y+2, W-PAD*2, ROW_H-6);
    ctx.fill();

    ctx.fillStyle = info.color;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(PAD+12, y+14, 3, ROW_H-30, 1.5);
    else ctx.rect(PAD+12, y+14, 3, ROW_H-30);
    ctx.fill();

    const ds = formatDate(e._date);
    if (ds !== lastDateLabel) {
      ctx.fillStyle = '#1a2a3a'; ctx.font = "bold 11px 'Noto Sans JP', sans-serif";
      ctx.fillText('▸ ' + ds, PAD+24, y + 24);
      lastDateLabel = ds;
    }

    let chipEndX = PAD + 24;
    if (!isSingle) {
      ctx.font = "bold 10px 'Noto Sans JP', sans-serif"; const chipW = ctx.measureText(info.name).width + 14;
      ctx.fillStyle = info.light; ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(PAD+24, y+32, chipW, 16, 8); else ctx.rect(PAD+24, y+32, chipW, 16);
      ctx.fill(); ctx.fillStyle = info.textColor; ctx.fillText(info.name, PAD+31, y+43);
      chipEndX = PAD + 24 + chipW + 6;
    }

    if (e.category) {
      ctx.font = "10px 'Noto Sans JP', sans-serif"; const catW = ctx.measureText(e.category).width + 12;
      ctx.fillStyle = '#e4ebf0'; ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(chipEndX, y+32, catW, 16, 8); else ctx.rect(chipEndX, y+32, catW, 16);
      ctx.fill(); ctx.fillStyle = '#5a7a8a'; ctx.fillText(e.category, chipEndX+6, y+43);
      chipEndX += catW + 6;
    }

    const t = formatTime(e.time);
    if (t) {
      ctx.fillStyle = '#5a7a8a'; ctx.font = "bold 11px 'Noto Sans JP', sans-serif";
      ctx.fillText('⏰ ' + t, W - PAD - ctx.measureText('⏰ ' + t).width - 16, y+34);
    }

    ctx.fillStyle = '#1a2a3a'; ctx.font = "bold 13px 'Noto Sans JP', sans-serif";
    let titleStr = e.title; const maxW = W - PAD*2 - 40;
    if (e.note) titleStr += ` （${e.note}）`;
    while (titleStr.length > 0 && ctx.measureText(titleStr).width > maxW) titleStr = titleStr.slice(0,-1);
    if (titleStr !== (e.title + (e.note ? ` （${e.note}）` : ''))) titleStr += '…';
    ctx.fillText(titleStr, PAD+24, y+56);
  });

  const footerY = H - 54;
  ctx.fillStyle = '#5a7a8a'; ctx.font = "bold 12px 'Noto Sans JP', sans-serif";
  ctx.fillText('掃 QR Code 查看完整行程', PAD, footerY);
  
  ctx.font = "11px 'Noto Sans JP', sans-serif"; ctx.fillStyle = '#9cb0bc';
  ctx.fillText('https://lightleakstw.github.io/hinatazaka-og-schedule', PAD, footerY + 18);
  ctx.fillText('一生一緒日向坂', PAD, footerY + 36);

  ctx.strokeStyle = '#d0deee'; ctx.lineWidth = 1;
  ctx.strokeRect(W - PAD - 50, footerY - 4, 50, 50);
  ctx.fillStyle = '#f4f8fa'; ctx.fillRect(W - PAD - 47, footerY - 1, 44, 44);
  ctx.fillStyle = '#7a8a9a'; ctx.font = "9px 'Noto Sans JP', sans-serif";
  ctx.fillText('QR', W - PAD - 34, footerY + 24);

  document.getElementById('card-overlay').classList.add('show');
}

function downloadCard() { const canvas = document.getElementById('schedule-canvas'); const a = document.createElement('a'); a.download = 'hinatazaka-og-schedule.png'; a.href = canvas.toDataURL('image/png'); a.click(); }
function closeCard(e) { if (e.target === document.getElementById('card-overlay')) { document.getElementById('card-overlay').classList.remove('show'); } }

async function init() {
  try {
    const results = await Promise.all(SHEETS.map(fetchSheet));
    allEvents = results.flat().map(e => ({ ...e, _date: parseDate(e.date) }));
    renderSchedule();
  } catch(err) {
    document.getElementById('schedule-container').innerHTML = '<div class="empty">載入失敗，請確認試算表已設為公開</div>';
  }
}
init();
</script>
